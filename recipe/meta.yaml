{% set name = "legacy-api-wrap" %}
{% set version = "1.5" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace("-", "_") }}-{{ version }}.tar.gz
  sha256: b41ba6532f3ebfe3a897a35a7f97dec3be04b92a450f6c2bcf89f1b91c9cadf2

build:
  noarch: python
  number: 0
  script: "{{ PYTHON }} -m pip install . -vv"

requirements:
  host:
    - pip
    - python {{ python_min }}
    - hatchling
    - hatch-vcs
    - hatch-docstring-description
  run:
    - python >={{ python_min }}

test:
  imports:
    - legacy_api_wrap
  requires:
    - python {{ python_min }}

about:
  home: https://github.com/flying-sheep/legacy-api-wrap
  license: MPL-2.0
  license_family: MOZILLA
  license_file: LICENSE.rst
  summary: "Wrap legacy APIs in python projects."

extra:
  recipe-maintainers:
    - raivivek
    - flying-sheep
